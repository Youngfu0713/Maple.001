<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡美學個人日程管理系統 - 全端通用完美拖曳版</title>
    <style>
        /* 💎 導入自訂字體 Miao.ttf */
        @font-face {
            font-family: 'MiaoFont';
            src: url('Miao.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --primary: #5151e5;
            --primary-hover: #3d3dbd;
            --primary-light: #eef2ff;
            --bg-main: #fcfbfa; 
            --bg-card: #ffffff;
            --text-main: #1e293b; 
            --text-muted: #64748b;
            --border: #f1f5f9;
            --border-hover: #cbd5e1;
            
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 10px 30px -10px rgba(15, 23, 42, 0.08);
            --shadow-active: 0 20px 40px -15px rgba(81, 81, 229, 0.25);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        body {
            font-family: "MiaoFont", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: contain;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .calendar-container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            min-height: 100vh;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(15, 23, 42, 0.03);
            border-right: 1px solid rgba(15, 23, 42, 0.03);
            position: relative;
        }

        /* 頂部導覽列 */
        .calendar-header {
            padding: 16px 20px 10px 20px;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(241, 245, 249, 0.8);
        }

        .calendar-header h1 {
            margin: 0 0 8px 0;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
        }

        .quick-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }

        .nav-btn {
            font-family: inherit;
            padding: 8px 10px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        #btn-today { flex: 1.5; background: var(--primary); color: white; border: none; font-weight: 800; }
        #btn-today:hover { background: var(--primary-hover); }

        .date-picker-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .date-picker-row label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }
        .date-picker-row input[type="date"] {
            font-family: inherit;
            padding: 5px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            background-color: #f8fafc;
            outline: none;
        }

        /* 表單區域 */
        .event-form {
            padding: 14px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-row { display: flex; gap: 8px; align-items: center; }
        .event-form input[type="text"] {
            font-family: inherit;
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            background: #f8fafc;
            color: var(--text-main);
            outline: none;
        }

        .font-color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            align-self: flex-start;
        }
        .font-color-picker-container label { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); }
        .font-color-picker-container input[type="color"] { border: none; width: 24px; height: 24px; cursor: pointer; background: none; padding: 0; }

        .category-selector-container { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .cat-tag-btn {
            font-family: inherit;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: 0.45;
            color: white;
        }
        .cat-tag-btn.active { opacity: 1; border-color: rgba(30, 41, 59, 0.7); box-shadow: 0 2px 8px rgba(15, 23, 42, 0.1); }

        .color-edit-toggle { font-family: inherit; padding: 5px 10px; border-radius: 20px; background: #f1f5f9; border: none; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); cursor: pointer; margin-left: auto; }
        .category-manage-panel { display: none; background: #f8fafc; padding: 12px; border-radius: var(--radius-md); border: 1px dashed var(--border-hover); gap: 8px; flex-direction: column; }
        .category-manage-panel.active { display: flex; }
        .manage-list-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .manage-list-item .left { display: flex; align-items: center; gap: 8px; }
        .manage-list-item input[type="color"] { border: none; width: 28px; height: 24px; background: none; padding: 0; }
        .cat-del-btn { font-family: inherit; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.78rem; font-weight: bold; }

        .add-new-cat-row { display: flex; gap: 6px; margin-top: 4px; border-top: 1px dashed #cbd5e1; padding-top: 10px; align-items: center; }
        .add-new-cat-row input[type="text"] { font-family: inherit; flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.78rem; }
        .add-new-cat-row input[type="color"] { border: none; width: 30px; height: 30px; background: none; padding: 0; }
        .add-cat-submit-btn { font-family: inherit; background: #1e293b; color: white; border: none; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 700; cursor: pointer; }

        .submit-btn { font-family: inherit; background: var(--primary); color: white; border: none; padding: 11px; border-radius: var(--radius-md); font-weight: 700; font-size: 0.9rem; cursor: pointer; }

        /* 列表與全新拖曳樣式 */
        .timeline { padding: 18px 20px; flex-grow: 1; position: relative; background: var(--bg-main); min-height: 300px; }
        .no-events { text-align: center; color: var(--text-muted); padding: 50px 20px; font-size: 0.85rem; font-weight: 600; }

        /* 💎 頂級 Pointer-Based 拖曳卡片 */
        .event-card {
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 14px; 
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            position: relative;
            cursor: grab;
            user-select: none;
            /* 💎 關鍵：禁止手機網頁預設的長按選取與滾動干涉 */
            touch-action: none; 
            -webkit-user-drag: none;
        }
        .event-card:active { cursor: grabbing; }

        /* 💎 被真正拖曳中的虛擬浮空狀態 */
        .event-card.dragging {
            position: fixed !important;
            z-index: 9999 !important;
            pointer-events: none !important; /* 避免阻擋下方的碰撞偵測 */
            box-shadow: var(--shadow-active);
            transform: scale(1.04);
            opacity: 0.9;
            margin: 0 !important;
        }

        /* 💎 留在原地的虛線占位區 */
        .drag-placeholder {
            background: rgba(81, 81, 229, 0.05);
            border: 2px dashed rgba(81, 81, 229, 0.35);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .event-info { flex-grow: 1; display: flex; align-items: center; gap: 10px; padding-right: 12px; min-width: 0; pointer-events: none; }
        .category-badge { font-size: 0.7rem; font-weight: 800; padding: 3.5px 9px; border-radius: 12px; color: white; white-space: nowrap; flex-shrink: 0; }
        .event-title { font-size: 0.92rem; font-weight: 700; margin: 0; line-height: 1.5; word-break: break-all; flex-grow: 1; min-width: 0; }

        /* Bottom Sheet Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.45); backdrop-filter: blur(4px);
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .action-sheet {
            font-family: inherit; width: 100%; max-width: 550px; background: #ffffff;
            border-radius: 20px 20px 0 0; padding: 24px 20px 34px 20px;
            box-shadow: 0 -15px 40px rgba(15, 23, 42, 0.12);
            transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 16px;
        }
        .modal-overlay.show .action-sheet { transform: translateY(0); }

        .sheet-drag-indicator { width: 40px; height: 5px; background-color: #e2e8f0; border-radius: 3px; align-self: center; margin-bottom: 4px; }
        .sheet-header { display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid #f1f5f9; padding-bottom: 14px; }
        .sheet-title-desc { font-size: 0.78rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .sheet-event-title { font-size: 1.05rem; font-weight: 800; color: var(--text-main); margin: 0; line-height: 1.4; }

        .sheet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .sheet-btn.danger-btn { grid-column: span 2; }

        .sheet-btn {
            font-family: inherit; background-color: #f8fafc; border: 1px solid #f1f5f9;
            border-radius: var(--radius-lg); padding: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; color: var(--text-main); font-weight: 800; font-size: 0.88rem;
        }
        .sheet-btn:hover { background-color: #eef2ff; border-color: rgba(81, 81, 229, 0.25); }
        .sheet-btn.danger-btn:hover { background-color: #fef2f2; border-color: rgba(239, 68, 68, 0.25); color: #ef4444; }
        .sheet-btn svg { width: 22px; height: 22px; }

        .sheet-edit-panel { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-lg); padding: 16px; flex-direction: column; gap: 10px; }
        .sheet-edit-panel.show { display: flex; }
        .sheet-edit-panel input[type="text"] { font-family: inherit; padding: 10px; border: 1px solid var(--border-hover); border-radius: var(--radius-md); font-size: 0.9rem; outline: none; }
        
        .sheet-move-date-panel { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-lg); padding: 16px; flex-direction: column; gap: 10px; }
        .sheet-move-date-panel.show { display: flex; }
        .sheet-move-date-panel input[type="date"] { font-family: inherit; padding: 10px; border: 1px solid var(--border-hover); border-radius: var(--radius-md); font-size: 0.9rem; outline: none; font-weight: bold; }

        .sheet-category-panel { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-lg); padding: 14px; flex-direction: column; gap: 8px; }
        .sheet-category-panel.show { display: flex; }
        .sheet-category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .sheet-category-item { padding: 10px 14px; border-radius: var(--radius-md); background: #ffffff; border: 1px solid #f1f5f9; font-size: 0.82rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .sheet-category-item .dot { width: 10px; height: 10px; border-radius: 50%; }

        .sheet-panel-submit { font-family: inherit; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); padding: 11px; font-size: 0.88rem; font-weight: 800; cursor: pointer; }
        .sheet-close-btn { font-family: inherit; background: none; border: none; color: var(--text-muted); font-size: 0.82rem; font-weight: 700; cursor: pointer; padding: 10px; border-radius: var(--radius-md); background-color: #f1f5f9; text-align: center; }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <h1 id="current-day">日程管理</h1>
            <div class="quick-nav">
                <button class="nav-btn" id="btn-prev">◀ 前一天</button>
                <button class="nav-btn" id="btn-today">今天</button>
                <button class="nav-btn" id="btn-next">後一天 ▶</button>
            </div>
            <div class="date-picker-row">
                <label for="date-select">跳轉日期：</label>
                <input type="date" id="date-select">
            </div>
        </div>

        <div class="event-form">
            <div class="form-row">
                <input type="text" id="evt-title" placeholder="請輸入重要事項..." required>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; justify-content: space-between;">
                <div class="font-color-picker-container">
                    <label for="evt-font-color">🎨 字體顏色：</label>
                    <input type="color" id="evt-font-color" value="">
                </div>
            </div>
            <div class="category-selector-container">
                <div id="category-buttons-list" style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex-grow: 1;"></div>
                <button class="color-edit-toggle" id="color-toggle-btn">⚙️ 管理</button>
            </div>
            <div class="category-manage-panel" id="color-panel">
                <div id="manage-categories-list" style="display: flex; flex-direction: column; gap: 6px;"></div>
                <div class="add-new-cat-row">
                    <input type="text" id="new-cat-name" placeholder="新名稱...">
                    <input type="color" id="new-cat-color" value="#5151e5">
                    <button class="add-cat-submit-btn" id="add-new-cat-btn">➕ 新增</button>
                </div>
            </div>
            <button class="submit-btn" id="add-evt-btn">安排至行程表</button>
        </div>

        <div class="timeline" id="timeline-list"></div>
    </div>

    <div class="modal-overlay" id="action-modal" onclick="closeActionModal()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div class="sheet-drag-indicator"></div>
            <div class="sheet-header">
                <span class="sheet-title-desc">📋 行程設定</span>
                <p class="sheet-event-title" id="modal-event-title">事件標題載入中...</p>
            </div>

            <div class="sheet-grid">
                <button class="sheet-btn" id="modal-btn-edit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    <span>編輯內文</span>
                </button>
                <button class="sheet-btn" id="modal-btn-move">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3L14.5 21a.55.55 0 0 1-1 0L10 14l-7-3.5a.55.55 0 0 1 0-1L21 3z"/><path d="M21 3L10 14"/></svg>
                    <span>跨日期移動</span>
                </button>
                <button class="sheet-btn" id="modal-btn-copy">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span>複製本事件</span>
                </button>
                <button class="sheet-btn" id="modal-btn-category">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <span>切換類別</span>
                </button>
                <button class="sheet-btn danger-btn" id="modal-btn-delete">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    <span style="color: #ef4444;">刪除本行程</span>
                </button>
            </div>

            <div class="sheet-edit-panel" id="modal-edit-panel">
                <label style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted);">✏️ 修改事項名稱與顏色：</label>
                <input type="text" id="modal-edit-title-input">
                <div style="display: flex; align-items: center; gap: 8px; margin: 4px 0;">
                    <label style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted);">🎨 字體顏色：</label>
                    <input type="color" id="modal-edit-color-input">
                </div>
                <button class="sheet-panel-submit" id="modal-edit-submit-btn">儲存修改</button>
            </div>

            <div class="sheet-move-date-panel" id="modal-move-panel">
                <label>✈️ 請選擇要移動的目的地日期：</label>
                <input type="date" id="modal-move-date-input">
                <button class="sheet-panel-submit" id="modal-move-submit-btn">確認發送</button>
            </div>

            <div class="sheet-category-panel" id="modal-category-panel">
                <label style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px;">🏷️ 快速套用類別：</label>
                <div class="sheet-category-grid" id="modal-category-grid"></div>
            </div>

            <button class="sheet-close-btn" onclick="closeActionModal()">取消</button>
        </div>
    </div>

    <script>
        const dateSelect = document.getElementById('date-select');
        const timeline = document.getElementById('timeline-list');
        const addBtn = document.getElementById('add-evt-btn');
        const currentDayText = document.getElementById('current-day');
        const evtFontColorInput = document.getElementById('evt-font-color');

        const colorPanel = document.getElementById('color-panel');
        const colorToggleBtn = document.getElementById('color-toggle-btn');
        const categoryButtonsList = document.getElementById('category-buttons-list');
        const manageCategoriesList = document.getElementById('manage-categories-list');
        const addNewCatBtn = document.getElementById('add-new-cat-btn');
        const newCatNameInput = document.getElementById('new-cat-name');
        const newCatColorInput = document.getElementById('new-cat-color');

        const btnPrev = document.getElementById('btn-prev');
        const btnToday = document.getElementById('btn-today');
        const btnNext = document.getElementById('btn-next');

        const actionModal = document.getElementById('action-modal');
        const modalEventTitle = document.getElementById('modal-event-title');
        const modalBtnEdit = document.getElementById('modal-btn-edit');
        const modalBtnMove = document.getElementById('modal-btn-move');
        const modalBtnCopy = document.getElementById('modal-btn-copy');
        const modalBtnCategory = document.getElementById('modal-btn-category');
        const modalBtnDelete = document.getElementById('modal-btn-delete');
        
        const modalEditPanel = document.getElementById('modal-edit-panel');
        const modalEditTitleInput = document.getElementById('modal-edit-title-input');
        const modalEditColorInput = document.getElementById('modal-edit-color-input');
        const modalEditSubmitBtn = document.getElementById('modal-edit-submit-btn');

        const modalMovePanel = document.getElementById('modal-move-panel');
        const modalMoveDateInput = document.getElementById('modal-move-date-input');
        const modalMoveSubmitBtn = document.getElementById('modal-move-submit-btn');

        const modalCategoryPanel = document.getElementById('modal-category-panel');
        const modalCategoryGrid = document.getElementById('modal-category-grid');

        let activeEventIndex = null;

        let customCategories = JSON.parse(localStorage.getItem('pro_calendar_custom_categories')) || [
            { id: "personal", name: "個人", color: "#47b881" },
            { id: "family", name: "家庭", color: "#4c90e2" },
            { id: "work", name: "職場", color: "#9c27b0" },
            { id: "idea", name: "想法", color: "#f5a623" }
        ];

        let selectedCategoryId = localStorage.getItem('pro_calendar_selected_cat') || customCategories[0]?.id || "";

        function updateDefaultFontColorPicker() {
            const currentCat = customCategories.find(c => c.id === selectedCategoryId);
            if (currentCat) evtFontColorInput.value = currentCat.color;
        }

        function hexToRgba(hex, alpha) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex.split('').map(char => char + char).join('');
            return `rgba(${parseInt(hex.substring(0, 2), 16)}, ${parseInt(hex.substring(2, 4), 16)}, ${parseInt(hex.substring(4, 6), 16)}, ${alpha})`;
        }

        function renderCategorySelectionButtons() {
            categoryButtonsList.innerHTML = '';
            if (!customCategories.some(c => c.id === selectedCategoryId) && customCategories.length > 0) {
                selectedCategoryId = customCategories[0].id;
                localStorage.setItem('pro_calendar_selected_cat', selectedCategoryId);
            }
            customCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-tag-btn ${cat.id === selectedCategoryId ? 'active' : ''}`;
                btn.style.backgroundColor = cat.color;
                btn.textContent = cat.name;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-tag-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCategoryId = cat.id;
                    localStorage.setItem('pro_calendar_selected_cat', selectedCategoryId);
                    updateDefaultFontColorPicker();
                });
                categoryButtonsList.appendChild(btn);
            });
            updateDefaultFontColorPicker();
        }

        function renderManageCategoriesList() {
            manageCategoriesList.innerHTML = '';
            customCategories.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'manage-list-item';
                row.innerHTML = `<div class="left"><input type="color" value="${cat.color}"><span>${cat.name}</span></div><button class="cat-del-btn">🗑️</button>`;
                row.querySelector('input[type="color"]').addEventListener('input', (e) => {
                    cat.color = e.target.value;
                    saveCategories(); renderCategorySelectionButtons(); renderTimeline();
                });
                row.querySelector('.cat-del-btn').addEventListener('click', () => {
                    if (customCategories.length <= 1) { alert('最少保留一個類別！'); return; }
                    if (confirm(`確定刪除「${cat.name}」嗎？`)) {
                        customCategories = customCategories.filter(c => c.id !== cat.id);
                        saveCategories(); renderCategorySelectionButtons(); renderManageCategoriesList(); renderTimeline();
                    }
                });
                manageCategoriesList.appendChild(row);
            });
        }

        addNewCatBtn.addEventListener('click', () => {
            const name = newCatNameInput.value.trim();
            if (!name) return;
            customCategories.push({ id: 'cat_' + Date.now(), name: name, color: newCatColorInput.value });
            newCatNameInput.value = ''; saveCategories(); renderCategorySelectionButtons(); renderManageCategoriesList();
        });

        function saveCategories() { localStorage.setItem('pro_calendar_custom_categories', JSON.stringify(customCategories)); }
        colorToggleBtn.addEventListener('click', () => {
            colorPanel.classList.toggle('active');
            colorToggleBtn.textContent = colorPanel.classList.contains('active') ? "❌" : "⚙️ 管理";
            if (colorPanel.classList.contains('active')) renderManageCategoriesList();
        });

        function getLocalDateString(date) {
            return new Date(date.getTime() - (date.getTimezoneOffset() * 60 * 1000)).toISOString().split('T')[0];
        }

        let selectedDateStr = getLocalDateString(new Date());
        dateSelect.value = selectedDateStr;
        let allEvents = JSON.parse(localStorage.getItem('pro_multi_date_calendar_v3')) || {};

        if (Object.keys(allEvents).length === 0) {
            allEvents[selectedDateStr] = [
                { title: "滑鼠或直接手指按住卡片進行上下拖曳排序", cat: "work", color: "#9c27b0" },
                { title: "輕點本卡片即可彈出修改文字內容", cat: "personal", color: "#47b881" }
            ];
            localStorage.setItem('pro_multi_date_calendar_v3', JSON.stringify(allEvents));
        }

        function updateHeaderTitle() {
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            currentDayText.textContent = `${selectedDateStr} (${new Date(selectedDateStr).toLocaleDateString('zh-TW', options)})`;
        }

        // ------------------ 💎 終極完美 PointerEvent 物理拖曳排序系統 ------------------
        let dragEl = null;
        let placeholderEl = null;
        let startY = 0;
        let startTop = 0;
        let isMoveTriggered = false;

        function renderTimeline() {
            timeline.innerHTML = '';
            const events = allEvents[selectedDateStr] || [];

            if (events.length === 0) {
                timeline.innerHTML = '<div class="no-events">📅 本日尚無安排日程</div>';
                return;
            }

            events.forEach((evt, idx) => {
                const card = document.createElement('div');
                card.className = `event-card`;
                card.dataset.index = idx;

                const catInfo = customCategories.find(c => c.id === evt.cat) || { name: "未分類", color: "#94a3b8" };
                card.style.backgroundColor = hexToRgba(catInfo.color, 0.12);

                card.innerHTML = `
                    <div class="event-info">
                        <span class="category-badge" style="background-color: ${catInfo.color};">${catInfo.name}</span>
                        <p class="event-title" style="color: ${evt.color || catInfo.color}">${evt.title}</p>
                    </div>
                `;

                // 💎 使用通用指標事件 (滑鼠與觸控一網打盡)
                card.addEventListener('pointerdown', (e) => {
                    // 如果點擊到的是按鈕之類的就不觸發拖曳 (這裡只有純文字跟徽章)
                    if (e.button !== 0 && e.pointerType === 'mouse') return; // 僅限滑鼠左鍵

                    dragEl = card;
                    startY = e.clientY;
                    isMoveTriggered = false;

                    // 記錄卡片當前相對於視窗的絕對位置
                    const rect = card.getBoundingClientRect();
                    startTop = rect.top;

                    // 設定指標捕捉
                    card.setPointerCapture(e.pointerId);
                });

                card.addEventListener('pointermove', (e) => {
                    if (!dragEl || dragEl !== card) return;
                    
                    const deltaY = e.clientY - startY;

                    // 判定是否真正開始移動 (大於 4 像素才算，防止輕微手震誤判)
                    if (!isMoveTriggered && Math.abs(deltaY) > 4) {
                        isMoveTriggered = true;

                        // 建立留在原地的虛線占位區
                        placeholderEl = document.createElement('div');
                        placeholderEl.className = 'drag-placeholder';
                        placeholderEl.style.height = `${card.offsetHeight}px`;
                        card.parentNode.insertBefore(placeholderEl, card);

                        // 把卡片轉為絕對浮空狀態
                        card.style.width = `${card.offsetWidth}px`;
                        card.classList.add('dragging');
                    }

                    if (isMoveTriggered) {
                        // 讓卡片緊緊跟隨指標位置
                        card.style.top = `${startTop + deltaY}px`;

                        // 核心碰撞偵測：找出目前指標下方是哪張卡片
                        const siblings = [...timeline.querySelectorAll('.event-card:not(.dragging)')];
                        let nextSibling = siblings.find(sibling => {
                            const r = sibling.getBoundingClientRect();
                            return e.clientY < r.top + r.height / 2;
                        });

                        // 動態搬移虛線占位區
                        if (nextSibling) {
                            timeline.insertBefore(placeholderEl, nextSibling);
                        } else {
                            timeline.appendChild(placeholderEl);
                        }
                    }
                });

                card.addEventListener('pointerup', (e) => {
                    if (!dragEl || dragEl !== card) return;
                    card.releasePointerCapture(e.pointerId);

                    if (isMoveTriggered) {
                        // 把卡片放進剛剛預留的虛線占位區位置
                        if (placeholderEl && placeholderEl.parentNode) {
                            placeholderEl.parentNode.insertBefore(card, placeholderEl);
                        }

                        // 清除所有暫存屬性
                        card.classList.remove('dragging');
                        card.style.position = '';
                        card.style.top = '';
                        card.style.width = '';
                        if (placeholderEl) { placeholderEl.remove(); placeholderEl = null; }

                        // 儲存新排序
                        saveOrder();
                    } else {
                        // 💎 沒發生移動，代表只是「單純點擊」，彈出選單！
                        openActionModal(idx, evt);
                    }

                    dragEl = null;
                    isMoveTriggered = false;
                });

                card.addEventListener('pointercancel', (e) => {
                    if (!dragEl) return;
                    card.releasePointerCapture(e.pointerId);
                    card.classList.remove('dragging');
                    card.style.position = '';
                    card.style.top = '';
                    card.style.width = '';
                    if (placeholderEl) { placeholderEl.remove(); placeholderEl = null; }
                    dragEl = null;
                    isMoveTriggered = false;
                });

                timeline.appendChild(card);
            });
        }

        function saveOrder() {
            const currentCards = [...timeline.querySelectorAll('.event-card')];
            const newEventsList = [];
            const oldEvents = allEvents[selectedDateStr] || [];

            currentCards.forEach(card => {
                const oldIndex = parseInt(card.dataset.index);
                if (oldEvents[oldIndex]) {
                    newEventsList.push(oldEvents[oldIndex]);
                }
            });

            if (newEventsList.length > 0) {
                allEvents[selectedDateStr] = newEventsList;
                saveAndRender();
            }
        }

        // ------------------ 五大功能選單處理 ------------------
        function openActionModal(idx, evt) {
            activeEventIndex = idx;
            modalEventTitle.textContent = evt.title;
            modalEditPanel.classList.remove('show');
            modalMovePanel.classList.remove('show');
            modalCategoryPanel.classList.remove('show');
            actionModal.classList.add('show');
        }

        function closeActionModal() { actionModal.classList.remove('show'); activeEventIndex = null; }

        modalBtnEdit.addEventListener('click', () => {
            modalMovePanel.classList.remove('show');
            modalCategoryPanel.classList.remove('show');
            const evt = allEvents[selectedDateStr][activeEventIndex];
            modalEditTitleInput.value = evt.title;
            const catInfo = customCategories.find(c => c.id === evt.cat);
            modalEditColorInput.value = evt.color || (catInfo ? catInfo.color : "#5151e5");
            modalEditPanel.classList.toggle('show');
        });

        modalEditSubmitBtn.addEventListener('click', () => {
            const newTitle = modalEditTitleInput.value.trim();
            if (!newTitle) return;
            allEvents[selectedDateStr][activeEventIndex].title = newTitle;
            allEvents[selectedDateStr][activeEventIndex].color = modalEditColorInput.value;
            saveAndRender(); closeActionModal();
        });

        modalBtnMove.addEventListener('click', () => {
            modalEditPanel.classList.remove('show');
            modalCategoryPanel.classList.remove('show');
            modalMoveDateInput.value = selectedDateStr;
            modalMovePanel.classList.toggle('show');
        });

        modalMoveSubmitBtn.addEventListener('click', () => {
            const target = modalMoveDateInput.value;
            if (!target || target === selectedDateStr) return;
            const targetEvt = allEvents[selectedDateStr].splice(activeEventIndex, 1)[0];
            if (allEvents[selectedDateStr].length === 0) delete allEvents[selectedDateStr];
            if (!allEvents[target]) allEvents[target] = [];
            allEvents[target].push(targetEvt);
            localStorage.setItem('pro_multi_date_calendar_v3', JSON.stringify(allEvents));
            closeActionModal(); changeSelectedDate(target);
        });

        modalBtnCopy.addEventListener('click', () => {
            const original = allEvents[selectedDateStr][activeEventIndex];
            allEvents[selectedDateStr].splice(activeEventIndex + 1, 0, { ...original });
            saveAndRender(); closeActionModal();
        });

        modalBtnCategory.addEventListener('click', () => {
            modalEditPanel.classList.remove('show');
            modalMovePanel.classList.remove('show');
            modalCategoryGrid.innerHTML = '';
            const currentCatId = allEvents[selectedDateStr][activeEventIndex].cat;
            customCategories.forEach(cat => {
                const isCurrent = cat.id === currentCatId;
                const item = document.createElement('div');
                item.className = 'sheet-category-item';
                if (isCurrent) item.style.backgroundColor = hexToRgba(cat.color, 0.12);
                item.innerHTML = `<span class="dot" style="background-color: ${cat.color}"></span><span>${cat.name} ${isCurrent?'✓':''}</span>`;
                item.addEventListener('click', () => {
                    allEvents[selectedDateStr][activeEventIndex].cat = cat.id;
                    saveAndRender(); closeActionModal();
                });
                modalCategoryGrid.appendChild(item);
            });
            modalCategoryPanel.classList.toggle('show');
        });

        modalBtnDelete.addEventListener('click', () => {
            if (confirm('確定要刪除此行程嗎？')) {
                allEvents[selectedDateStr].splice(activeEventIndex, 1);
                if (allEvents[selectedDateStr].length === 0) delete allEvents[selectedDateStr];
                saveAndRender(); closeActionModal();
            }
        });

        function saveAndRender() { localStorage.setItem('pro_multi_date_calendar_v3', JSON.stringify(allEvents)); renderTimeline(); }
        function changeSelectedDate(dateStr) { selectedDateStr = dateStr; dateSelect.value = dateStr; updateHeaderTitle(); renderTimeline(); }

        dateSelect.addEventListener('change', (e) => changeSelectedDate(e.target.value));
        btnToday.addEventListener('click', () => changeSelectedDate(getLocalDateString(new Date())));
        btnPrev.addEventListener('click', () => { const d = new Date(selectedDateStr); d.setDate(d.getDate() - 1); changeSelectedDate(getLocalDateString(d)); });
        btnNext.addEventListener('click', () => { const d = new Date(selectedDateStr); d.setDate(d.getDate() + 1); changeSelectedDate(getLocalDateString(d)); });

        addBtn.addEventListener('click', () => {
            const title = document.getElementById('evt-title').value.trim();
            if(!title) return;
            if (!allEvents[selectedDateStr]) allEvents[selectedDateStr] = [];
            allEvents[selectedDateStr].push({ title: title, cat: selectedCategoryId, color: evtFontColorInput.value });
            document.getElementById('evt-title').value = ''; saveAndRender();
        });

        renderCategorySelectionButtons();
        changeSelectedDate(selectedDateStr);
    </script>
</body>
</html>
